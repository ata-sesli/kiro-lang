# Smoke tests for older .kiro feature samples.
#
# command:
# - check: static parser + semantic validation only
# - build: transpile and build only
# - run: full interpreter -> Rust build -> execute pipeline
#
# Network-dependent samples live in tests/smoke/manual and are intentionally not
# listed here.

[[case]]
name = "scratch_parse_sample"
path = "pass/test.kiro"
command = "check"
expect = "pass"

[[case]]
name = "imports"
path = "pass/imports/main.kiro"
command = "run"
expect = "pass"
stdout_contains = ["Testing Imports...", "30", "25"]

[[case]]
name = "assignment_keeps_source_usable"
